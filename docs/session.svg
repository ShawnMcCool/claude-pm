<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="340" rx="12" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="899" height="339" rx="12" fill="none" stroke="#30363d"/>

  <text x="450" y="38" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="600" letter-spacing="0.5">CONTEXT RECOVERY ACROSS SESSIONS</text>
  <line x1="310" y1="48" x2="590" y2="48" stroke="#30363d"/>

  <!-- Session 1 -->
  <g filter="url(#sh3)">
    <rect x="40" y="70" width="250" height="190" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="165" y="95" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="600">Session 1</text>

    <text x="60" y="125" fill="#c9d1d9" font-size="11" font-family="monospace">/task new backdrop images</text>

    <text x="60" y="150" fill="#8b949e" font-size="10">Agent leads Define conversation</text>
    <text x="60" y="166" fill="#8b949e" font-size="10">Problem statement written to plan</text>
    <text x="60" y="182" fill="#8b949e" font-size="10">Design: 2 approaches explored</text>
    <text x="60" y="198" fill="#8b949e" font-size="10">5 acceptance criteria agreed</text>

    <rect x="60" y="215" width="210" height="28" rx="6" fill="#21262d"/>
    <text x="72" y="234" fill="#d29922" font-size="11" font-family="monospace">/task pause lunch break</text>
  </g>

  <!-- The gap -->
  <g>
    <line x1="305" y1="165" x2="345" y2="165" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="325" y="185" text-anchor="middle" fill="#484f58" font-size="20">😴</text>
    <text x="325" y="205" text-anchor="middle" fill="#484f58" font-size="10">hours / days</text>
  </g>

  <!-- Session 2 -->
  <g filter="url(#sh3)">
    <rect x="360" y="70" width="250" height="190" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="485" y="95" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">Session 2</text>

    <rect x="380" y="110" width="210" height="28" rx="6" fill="#21262d"/>
    <text x="392" y="129" fill="#58a6ff" font-size="11" font-family="monospace">/task resume 3</text>

    <text x="380" y="158" fill="#8b949e" font-size="10">Agent reads board body + plan file</text>
    <text x="380" y="174" fill="#8b949e" font-size="10">Presents briefing with full context</text>
    <text x="380" y="190" fill="#8b949e" font-size="10">Picks up at Plan phase</text>
    <text x="380" y="206" fill="#8b949e" font-size="10">Explores codebase, writes impl plan</text>

    <rect x="380" y="220" width="210" height="28" rx="6" fill="#21262d"/>
    <text x="392" y="239" fill="#d29922" font-size="11" font-family="monospace">/task pause</text>
  </g>

  <!-- The gap 2 -->
  <g>
    <line x1="625" y1="165" x2="665" y2="165" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="645" y="185" text-anchor="middle" fill="#484f58" font-size="20">😴</text>
  </g>

  <!-- Session 3 -->
  <g filter="url(#sh3)">
    <rect x="680" y="70" width="190" height="190" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="775" y="95" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="600">Session 3</text>

    <rect x="700" y="110" width="150" height="28" rx="6" fill="#21262d"/>
    <text x="712" y="129" fill="#bc8cff" font-size="11" font-family="monospace">/task resume 3</text>

    <text x="700" y="158" fill="#8b949e" font-size="10">Full context recovered</text>
    <text x="700" y="174" fill="#8b949e" font-size="10">Implement → Verify → Ship</text>
    <text x="700" y="190" fill="#8b949e" font-size="10">Docs, cleanup, push</text>

    <rect x="700" y="210" width="150" height="28" rx="6" fill="#21262d"/>
    <text x="775" y="229" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">✓ Done</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="295" text-anchor="middle" fill="#8b949e" font-size="11">State lives in GitHub Projects — not in your terminal, not in your head.</text>
  <text x="450" y="315" text-anchor="middle" fill="#6e7681" font-size="11">Every session starts with full context. No cold starts. No lost progress.</text>
</svg>