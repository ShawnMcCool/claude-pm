<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="12" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="899" height="399" rx="12" fill="none" stroke="#30363d"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="600" letter-spacing="0.5">HOW IT WORKS</text>
  <line x1="370" y1="48" x2="530" y2="48" stroke="#30363d"/>

  <!-- YOU box -->
  <g filter="url(#sh2)">
    <rect x="50" y="140" width="140" height="120" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="120" y="185" text-anchor="middle" fill="#f0f6fc" font-size="28">👤</text>
    <text x="120" y="215" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">You</text>
    <text x="120" y="235" text-anchor="middle" fill="#8b949e" font-size="10">Confirm transitions</text>
    <text x="120" y="248" text-anchor="middle" fill="#8b949e" font-size="10">Give feedback</text>
  </g>

  <!-- /task Command box -->
  <g filter="url(#sh2)">
    <rect x="280" y="80" width="170" height="90" rx="12" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
    <text x="365" y="112" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="700" font-family="monospace">/task</text>
    <text x="365" y="132" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Command</text>
    <text x="365" y="152" text-anchor="middle" fill="#8b949e" font-size="10">Routes + board I/O</text>
  </g>

  <!-- Phase Skills box -->
  <g filter="url(#sh2)">
    <rect x="280" y="220" width="170" height="110" rx="12" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="365" y="255" text-anchor="middle" fill="#d29922" font-size="13" font-weight="600">Phase Skills</text>
    <text x="365" y="278" text-anchor="middle" fill="#8b949e" font-size="10">Define · Design · Plan</text>
    <text x="365" y="293" text-anchor="middle" fill="#8b949e" font-size="10">Implement · Verify · Ship</text>
    <text x="365" y="313" text-anchor="middle" fill="#6e7681" font-size="9" font-style="italic">Context in → work + signal out</text>
  </g>

  <!-- GitHub Projects box -->
  <g filter="url(#sh2)">
    <rect x="560" y="100" width="280" height="200" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="700" y="135" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">GitHub Projects</text>

    <!-- Mini board columns -->
    <rect x="580" y="155" width="50" height="120" rx="6" fill="#21262d"/>
    <text x="605" y="173" text-anchor="middle" fill="#da3633" font-size="8" font-weight="600">Define</text>
    <rect x="590" y="182" width="30" height="10" rx="3" fill="#30363d"/>
    <rect x="590" y="196" width="30" height="10" rx="3" fill="#30363d"/>

    <rect x="640" y="155" width="50" height="120" rx="6" fill="#21262d"/>
    <text x="665" y="173" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="600">Impl</text>
    <rect x="650" y="182" width="30" height="10" rx="3" fill="#238636" opacity="0.6"/>

    <rect x="700" y="155" width="50" height="120" rx="6" fill="#21262d"/>
    <text x="725" y="173" text-anchor="middle" fill="#58a6ff" font-size="8" font-weight="600">Verify</text>
    <rect x="710" y="182" width="30" height="10" rx="3" fill="#30363d"/>

    <rect x="760" y="155" width="50" height="120" rx="6" fill="#21262d"/>
    <text x="785" y="173" text-anchor="middle" fill="#bc8cff" font-size="8" font-weight="600">Ship</text>

    <!-- Body preview -->
    <text x="598" y="232" fill="#484f58" font-size="7" font-family="monospace">[03-07] Define done</text>
    <text x="598" y="243" fill="#484f58" font-size="7" font-family="monospace">[03-07] Design ok</text>
    <text x="598" y="254" fill="#484f58" font-size="7" font-family="monospace">[03-08] impl-1...</text>
    <text x="598" y="265" fill="#484f58" font-size="7" font-family="monospace">[03-08] Paused</text>
    <text x="580" y="288" fill="#6e7681" font-size="8" font-style="italic">↑ Session log in item body</text>
  </g>

  <!-- Plan file box -->
  <g filter="url(#sh2)">
    <rect x="560" y="320" width="160" height="55" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
    <text x="580" y="344" fill="#8b949e" font-size="11" font-family="monospace">plans/003-dark-mode.md</text>
    <text x="580" y="361" fill="#6e7681" font-size="9">Living doc — grows each phase</text>
  </g>

  <!-- Arrows: You ↔ Command -->
  <line x1="190" y1="185" x2="278" y2="135" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ga)"/>
  <line x1="278" y1="145" x2="190" y2="195" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ga)"/>
  <defs><marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7" fill="#8b949e"/></marker></defs>
  <text x="218" y="157" fill="#6e7681" font-size="9" transform="rotate(-19, 218, 157)">conversation</text>

  <!-- Arrow: Command ↔ Skills -->
  <line x1="365" y1="172" x2="365" y2="218" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ga)"/>
  <line x1="358" y1="218" x2="358" y2="172" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="385" y="199" fill="#6e7681" font-size="9">delegate</text>

  <!-- Arrow: Command → Board -->
  <line x1="452" y1="115" x2="558" y2="155" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <line x1="558" y1="170" x2="452" y2="130" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <defs><marker id="ba" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7" fill="#58a6ff"/></marker></defs>
  <text x="492" y="125" fill="#58a6ff" font-size="9" opacity="0.8">gh project</text>

  <!-- Arrow: Skills → Plan file -->
  <line x1="452" y1="300" x2="558" y2="340" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#pa)"/>
  <defs><marker id="pa" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7" fill="#6e7681"/></marker></defs>
  <text x="492" y="310" fill="#6e7681" font-size="9">extend plan</text>

  <!-- Legend -->
  <text x="50" y="375" fill="#6e7681" font-size="10">Skills are pure phases — they receive context and produce work. The command handles all GitHub board reads and writes.</text>
</svg>